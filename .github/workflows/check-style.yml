name: Java check style

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 11

      - name: Lint with CheckStyle
        run: ./scripts/checkstyle.bash
